}

.academic-calendar-header h2 {

  margin: 0;
}

/* Table styling */
.academic-calendar-table {
  width: 100%;
  border-collapse: collapse;
  margin: 0 auto;
  font-family: sans-serif;
  background-color: #f5faff;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

/* Table head */
.academic-calendar-table thead {
  background-color: #003366;
  color: white;
}

.academic-calendar-table th,
.academic-calendar-table td {
  padding: 12px;
  border: 1px solid #ddd;
  text-align: center;
}

/* Table body rows */
.academic-calendar-table tbody tr {
  transition: background-color 0.3s ease;
}

/* Hover effect */
.academic-calendar-table tbody tr:hover {
  background-color: #e6f2ff;
}

/* Links styling */
.academic-calendar-table a {
  text-decoration: none;
  color: #003366;
  font-weight: bold;
}

.academic-calendar-table a:hover {
  text-decoration: underline;
}
